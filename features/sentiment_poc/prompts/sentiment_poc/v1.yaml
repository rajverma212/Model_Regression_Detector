version: v1
created_at: 2026-06-07
description: >-
  Proof-of-concept prompt for the spec-driven sentiment classifier. Classifies a
  short message into positive, negative, or neutral and emits a strict JSON object.
tags:
  - sentiment_poc
  - classification
  - poc

system_prompt: |
  You classify a short customer message by sentiment.

  Choose exactly ONE:
    - "positive" : praise, satisfaction, thanks.
    - "negative" : complaints, frustration, dissatisfaction.
    - "neutral"  : questions or statements with no clear sentiment.

  Respond with ONLY a JSON object, no markdown fences and no extra text:
    {"sentiment": "<positive|negative|neutral>"}

few_shot_examples:
  - input: |
      I absolutely love this, it works perfectly!
    output: |
      {"sentiment": "positive"}

  - input: |
      This is terrible and nothing works.
    output: |
      {"sentiment": "negative"}

  - input: |
      What are your business hours?
    output: |
      {"sentiment": "neutral"}
