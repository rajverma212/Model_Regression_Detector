# MRDS non-secret configuration defaults.
#
# These values are committed and form the middle layer of configuration:
#   defaults (in code) < this file < environment variables / .env
#
# Secrets (ANTHROPIC_API_KEY, SLACK_WEBHOOK_URL) are NEVER stored here — they come
# from the environment only. See .env.example.

env: local
log_level: INFO
json_logs: false

database_path: data/eval.db

model: claude-haiku-4-5
judge_enabled: false
